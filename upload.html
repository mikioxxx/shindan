<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>参考画像アップロード</title>
    <style>
      :root {
        --bg: #101114;
        --panel: #181a20;
        --text: #f5f2ea;
        --muted: #b7b1a5;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #21c7b6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(680px, calc(100% - 28px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 7vw, 3rem);
        line-height: 1;
      }

      p {
        color: var(--muted);
      }

      input,
      button {
        width: 100%;
        min-height: 48px;
        margin-top: 14px;
        font: inherit;
      }

      input {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #101114;
        color: var(--text);
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #071414;
        font-weight: 900;
      }

      img {
        display: none;
        width: 100%;
        margin-top: 16px;
        border-radius: 8px;
      }

      .status {
        min-height: 24px;
        margin-top: 14px;
        color: var(--accent);
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>参考画像アップロード</h1>
      <p>PNG / JPEG / WebP を選んで送信してください。送信後、このPCのプロジェクト内に保存されます。</p>
      <input id="file" type="file" accept="image/png,image/jpeg,image/webp" />
      <button id="upload" type="button">画像を送る</button>
      <p class="status" id="status"></p>
      <img id="preview" alt="選択した画像のプレビュー" />
    </main>

    <script>
      const fileInput = document.querySelector("#file");
      const button = document.querySelector("#upload");
      const status = document.querySelector("#status");
      const preview = document.querySelector("#preview");
      let selectedDataUrl = "";

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.addEventListener("load", () => {
          selectedDataUrl = reader.result;
          preview.src = selectedDataUrl;
          preview.style.display = "block";
          status.textContent = `${file.name} を選択しました。`;
        });
        reader.readAsDataURL(file);
      });

      button.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file || !selectedDataUrl) {
          status.textContent = "先に画像を選択してください。";
          return;
        }

        status.textContent = "送信中...";
        const response = await fetch("/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: file.name, dataUrl: selectedDataUrl })
        });
        const result = await response.json();
        status.textContent = response.ok
          ? `保存しました: ${result.file}`
          : result.error || "アップロードに失敗しました。";
      });
    </script>
  </body>
</html>
