<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>タイプ別画像生成リファレンス</title>
    <style>
      :root {
        --bg: #101114;
        --panel: #181a20;
        --text: #f5f2ea;
        --muted: #b7b1a5;
        --line: rgba(255, 255, 255, 0.12);
        --gold: #f2b84b;
        --pink: #ff2f7d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 70px;
      }

      header,
      .base-prompt {
        display: grid;
        gap: 12px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      h2,
      h3,
      p {
        margin-top: 0;
      }

      p {
        color: var(--muted);
      }

      a {
        color: var(--gold);
        text-decoration: none;
      }

      .base-prompt,
      article {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .base-prompt {
        padding: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      article {
        overflow: hidden;
      }

      .top {
        display: grid;
        grid-template-columns: 104px 1fr;
        gap: 14px;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      img {
        width: 104px;
        height: 104px;
        border-radius: 8px;
        object-fit: cover;
      }

      h2 {
        margin-bottom: 4px;
        font-size: 1.25rem;
      }

      .code {
        color: var(--gold);
        font-weight: 900;
      }

      .body {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      h3 {
        margin-bottom: 4px;
        color: var(--gold);
        font-size: 0.86rem;
      }

      textarea {
        width: 100%;
        min-height: 236px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #0c0d10;
        color: var(--text);
        font: 0.9rem/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--gold), #ffdf7b 54%, var(--pink));
        color: #071414;
        padding: 10px 12px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>タイプ別画像生成リファレンス</h1>
        <p>
          Midjourneyで描き分けが弱くならないよう、共通要素を短くし、タイプごとに体型・顔つき・服装・ポーズ・小物・色・背景を強めに分けています。
        </p>
        <p><a href="/">トップページへ</a> / <a href="/hero-gallery.html">画像候補ギャラリーへ</a></p>
      </header>

      <section class="base-prompt">
        <h2>共通ベース</h2>
        <p>
          縦長9:16。夜の街にいそうな創作キャラクター。誇張されたステッカー風イラスト。顔と上半身を大きく、背景は暗め、文字なし。
        </p>
      </section>

      <section class="grid" id="grid"></section>
    </main>

    <script>
      const base =
        "縦長9:16。夜の街にいそうな創作キャラクター。誇張されたステッカー風イラスト。顔と上半身を大きく、背景は暗め、文字なし。";

      const types = [
        {
          code: "ROEB",
          name: "ヒーローギフター",
          inner: "自分が場を救う主役だと思っている。感情が乗ると一気に前に出る。称賛されるほど燃える。",
          outer: "大柄で胸を張った体型。満面の笑顔。黒い派手なジャケット、太い金のネックレス、王冠型のペンダント。片手を高く上げる勝利ポーズ。金色と赤の強い光。背景は歓声が上がる夜のステージ。"
        },
        {
          code: "ROEA",
          name: "エモーショナルサポーター",
          inner: "人とのつながりを大事にする。相手の反応を見て安心する。情が深く、好きになると隠せない。",
          outer: "丸みのある優しい顔。涙目になりそうな笑顔。黒いパーカーにピンクのハートアクセサリー。両手で光るハートを差し出すポーズ。ピンク、コーラル、金色の柔らかい光。背景は温かいネオンのラウンジ。"
        },
        {
          code: "ROCB",
          name: "タクティカルコマンダー",
          inner: "状況を読む指揮官。勝ち筋、数字、タイミングを考える。感情よりも一手の強さを重視する。",
          outer: "細身で鋭い顔つき。片眉を上げた笑み。黒いロングコート、青いサングラス、金の時計。片手に作戦ボード、もう片手に小さな光るコイン。指差しポーズ。青、金、白の冷たい光。背景は都市の作戦室。"
        },
        {
          code: "ROCA",
          name: "プロデューサー",
          inner: "場の流れを作りたい仕切り役。自分が演出すればうまくいくと思っている。派手さより完成度を好む。",
          outer: "清潔感のある大人の顔。余裕のある微笑み。黒いスーツ風ジャケット、細い金アクセサリー、手帳とペン。片手で照明を指示するポーズ。紫、青緑、金の整った光。背景は高級ラウンジのステージ裏。"
        },
        {
          code: "RHEB",
          name: "隠れ情熱型",
          inner: "普段は静かだが内側は燃えている。限界まで我慢して、ある瞬間に一気に爆発する。",
          outer: "影のある鋭い顔。口元だけ笑っている。黒いフード、首元に隠れた金のチェーン。片手に赤く光る炎の小物。体を少し横向きに構える。赤、黒、金の強いコントラスト。背景は暗い路地と赤いネオン。"
        },
        {
          code: "RHEA",
          name: "エモーショナルロイヤリスト",
          inner: "長く深く支える忠誠型。派手に出るより、特別な関係を大切にする。距離の変化に敏感。",
          outer: "柔らかい目元、控えめな笑顔。黒いコート、月形の金ペンダント、手元に小さなハートの光。胸に手を当てる静かなポーズ。深い紫、月明かり、淡いピンク。背景は静かな夜の川沿い。"
        },
        {
          code: "RHCB",
          name: "戦略シャドウ",
          inner: "目立たずに成果を出す影の戦術家。感情を表に出さず、効率よく動く。",
          outer: "細く冷静な顔。薄い笑み。黒いハイネック、長いコート、細い金縁メガネ。チェスの駒を持つポーズ。青い光と黒い影。背景はビルの屋上、遠くにネオン。"
        },
        {
          code: "RHCA",
          name: "静かな認知欲型",
          inner: "目立ちすぎたくないが、ちゃんと気づかれたい。上品に存在感を出したい。",
          outer: "端正で静かな顔。少しだけ得意げな笑み。黒い上質なシャツ、小さな金のピン、細い指輪。スポットライトの端に立つポーズ。ミント、紫、金の控えめな光。背景は暗いバーの隅。"
        },
        {
          code: "SOEB",
          name: "チアリーダー",
          inner: "人を巻き込んで盛り上げる。明るさで場を押し上げる。自分も周囲も熱くしたい。",
          outer: "表情豊かで陽気な顔。大きく口を開けた笑顔。黒いTシャツに派手な金アクセ、腕にカラフルなバンド。両手を広げるポーズ。ピンク、オレンジ、金の紙吹雪。背景はにぎやかなネオン広場。"
        },
        {
          code: "SOEA",
          name: "コミュニティサポーター",
          inner: "場全体を支える世話役。人の空気を見て、安心できる場所を作ろうとする。",
          outer: "包容力のある丸い顔。安心感のある笑顔。黒いフーディー、金の丸いペンダント、緑の光る盾。片手を差し出す迎え入れポーズ。ミント、コーラル、金の柔らかい光。背景は暖かいラウンジ。"
        },
        {
          code: "SOCB",
          name: "アナリストサポーター",
          inner: "応援しながら冷静に観察する。感情だけでは動かず、効率と流れを考える。",
          outer: "理知的な細い顔。計算しているような笑み。黒いベスト、青いレンズの眼鏡、金の時計。片手にグラフ風のカードを持つ。青、白、金の整理された光。背景は静かなデータルーム風。"
        },
        {
          code: "SOCA",
          name: "空気感ガーディアン",
          inner: "場の居心地を守る守護役。競争よりも安心感と安定を大切にする。",
          outer: "落ち着いた穏やかな顔。静かな笑顔。黒いロングカーディガン、金の小さな護符、緑の光る輪。両手で空間を包むポーズ。緑、青緑、金の穏やかな光。背景は静かな夜のテラス。"
        },
        {
          code: "SHEB",
          name: "サイレントバースト",
          inner: "黙って見ているが、必要な時だけ突然大きく動く。普段との差が激しい。",
          outer: "無表情に近い顔から鋭い笑みに変わる瞬間。黒いフード、赤い裏地、太い金のリング。片手から赤い光が爆発するポーズ。赤、ピンク、黒の強い光。背景は暗い通路。"
        },
        {
          code: "SHEA",
          name: "コージーコンパニオン",
          inner: "静かに寄り添う伴走者。強く主張しないが、長く近くにいることで支える。",
          outer: "眠そうで優しい目。小さな笑顔。黒い柔らかいパーカー、細い金のネックレス、温かく光るカップ。肩の力が抜けた座りポーズ。琥珀色、淡いピンク、黒。背景は深夜の小さな店。"
        },
        {
          code: "SHCB",
          name: "バックライン戦略家",
          inner: "裏方で計画する支援者。無駄を嫌い、落ち着いて長期的に考える。",
          outer: "寡黙で知的な顔。ほとんど笑わない。黒いジャケット、細い金のチェーン、メモ帳、暗い端末。斜め下を見て考えるポーズ。深い青、緑、金の低い光。背景は静かなバックルーム。"
        },
        {
          code: "SHCA",
          name: "静かなパトロン",
          inner: "距離感を保って長く支える後援者。目立たないが、余裕と安定感がある。",
          outer: "落ち着いた大人の顔。控えめで余裕のある笑み。黒い高級コート、上品な金のペンダント、ワイングラスのような小物。椅子にゆったり座るポーズ。紫、白、金の静かな光。背景は暗い高級ラウンジ。"
        }
      ];

      const grid = document.querySelector("#grid");

      grid.innerHTML = types
        .map((type) => {
          const prompt = `${base}\n${type.code} ${type.name}。\n内面: ${type.inner}\n外見: ${type.outer}`;
          return `
            <article>
              <div class="top">
                <img src="assets/types/${type.code}.png" alt="${type.code} ${type.name}" loading="lazy" />
                <div>
                  <div class="code">${type.code}</div>
                  <h2>${type.name}</h2>
                  <p>${type.inner}</p>
                </div>
              </div>
              <div class="body">
                <div>
                  <h3>外見</h3>
                  <p>${type.outer}</p>
                </div>
                <div>
                  <h3>外部生成用プロンプト</h3>
                  <textarea readonly>${prompt}</textarea>
                </div>
                <button type="button" data-copy>コピー</button>
              </div>
            </article>
          `;
        })
        .join("");

      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", async () => {
          const textarea = button.closest("article").querySelector("textarea");
          await navigator.clipboard.writeText(textarea.value);
          const previous = button.textContent;
          button.textContent = "コピーしました";
          setTimeout(() => {
            button.textContent = previous;
          }, 1400);
        });
      });
    </script>
  </body>
</html>
